# Data
dataset_root: datasets/classifier20
split_seed: 0
#subject: sub-1
# Optional multi-subject training. When set, this takes precedence over subject.
# subjects: [sub-1, sub-2, sub-3]
# Use every available datasets/THINGS_EEG_2/sub-*/preprocessed_eeg_training.npy:
subjects: all

# Notebook-compatible 20-class subset from resources/SKIL_IV/visual_decoding.ipynb.
#class_subset: classifier20
# Optional explicit original THINGS zero-based class ids. When set, this
# overrides class_subset and can select a subset from a larger compact dataset.
class_indices: [
    1055,  # pizza
    9,     # airplane
    178,   # broccoli
    853,   # man
    435,   # doll
    1476,  # tiger
    1461,  # tennis_ball
    59,    # banana_peel
    431,   # dog
    977,   # panda
    114,   # bird
    159,   # bowling_ball
    28,    # apple
    374,   # cow
    596,   # glasses
    633,   # guitar
    146,   # book
    1246,  # shark
    390,   # crown
    1314,  # snowman
]
# Optional display names matching class_indices. If omitted, names are inferred
# from image_metadata.npy when possible.
# class_names: [airplane, banana_peel, bowling_ball, broccoli, dog, doll, man, panda, pizza, tennis_ball, tiger]

# Classifier architecture:
# - cnn: existing notebook-style 2D CNN
# - eegnet: compact EEGNet-style temporal + depthwise/separable conv model
model_architecture: cnn
cnn_hidden_dim: 128
eegnet_f1: 8
eegnet_d: 2
# eegnet_f2 defaults to f1 * d when omitted
# eegnet_f2: 16
eegnet_kernel_length: 63
eegnet_separable_kernel_length: 15
eegnet_dropout: 0.25

# Optimization
batch_size: 32
# Number of subjects to keep loaded at once for multi-subject runs.
# 1 minimizes RAM; 2-3 can be faster if RAM allows; 10 approximates all-at-once.
subject_chunk_size: 1
num_workers: 0
lr: 0.0005
weight_decay: 0.0
epochs: 10

# Speed/diagnostics:
# - Final test evaluation always runs once after training.
# - Enable these only when you need per-epoch diagnostics; they add full extra
#   passes over all selected subjects.
evaluate_train_each_epoch: false
evaluate_test_each_epoch: false

# L1 regularization on the first dense layer, matching the notebook's Dense(128) regularizer.
l1_weight: 0.0005

# Runtime/output
device: auto
output_dir: outputs/eeg_classifier
run_change_note: "Initial classifier implementation"

# EEG normalization: l2 (per-sample), zscore (train-set channel-wise), or none
eeg_normalization: zscore
eeg_zscore_eps: 1.0e-6

# Optional EEG time-window crop applied at runtime before normalization.
eeg_window_pre_ms: 0
eeg_window_post_ms: 500

# EEG sampling:
# - repetitions: train/eval on each repetition separately, closest to the notebook
# - all: average all repeats per stimulus
# - random_k: sample k repeats per __getitem__ (train split only; valid/test always average all repeats)
sample_mode: repetitions
# Required when sample_mode: random_k
# k_repeats: 2
