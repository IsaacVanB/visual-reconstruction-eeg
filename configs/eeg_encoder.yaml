# Data
dataset_root: datasets
latent_root: latents/img_pca
subject: sub-1
split_seed: 0

# Match latent PCA dimensionality.
output_dim: 256

# EEG encoder architecture
temporal_filters: 32
depth_multiplier: 2
temporal_kernel1: 51
temporal_kernel3: 13
pool1: 2
pool3: 5
dropout: 0.3

# Optimization
batch_size: 16
num_workers: 0
lr: 0.00001
weight_decay: 0.001
epochs: 15

# Runtime/output
device: auto
output_dir: outputs/eeg_encoder
eval_max_samples: 16

# EEG normalization: l2 (per-sample), zscore (train-set channel-wise), or none
eeg_normalization: zscore
eeg_zscore_eps: 1.0e-6

# Subset experiment control:
# - default100: classes [0,2,4,...,198]
# - all: use every class available in the dataset
class_subset: default100
# Optional explicit override (takes precedence over class_subset when provided):
# class_indices: [0, 1, 2, 3]
